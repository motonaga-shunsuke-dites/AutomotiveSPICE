<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ASPICE Doc Tool — Requests</title>
<link rel="stylesheet" href="/css/styles.css">
<style>
.req-layout { display:flex; height:calc(100vh - 48px); overflow:hidden; }
.req-list-pane { width:340px; flex-shrink:0; border-right:1px solid var(--border); display:flex; flex-direction:column; }
.req-list-header { padding:12px 16px; border-bottom:1px solid var(--border); display:flex; gap:8px; align-items:center; }
.req-list-header .main-title { flex:1; }
.req-items { flex:1; overflow-y:auto; }
.req-item { padding:12px 16px; border-bottom:1px solid var(--border); cursor:pointer; }
.req-item:hover { background:var(--hover); }
.req-item.active { background:var(--selected); }
.req-item-top { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
.req-item-id { font-size:11px; color:var(--text-dim); font-family:monospace; }
.req-item-title { font-weight:500; font-size:14px; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.req-item-desc { font-size:12px; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.req-detail-pane { flex:1; overflow-y:auto; padding:24px 32px; }
.req-detail-pane .empty { color:var(--text-dim); margin-top:60px; text-align:center; }
.req-form { max-width:680px; }
.req-form .form-row { margin-bottom:16px; }
.req-form label { display:block; font-size:12px; color:var(--text-dim); margin-bottom:4px; }
.req-form input[type=text], .req-form textarea, .req-form select { width:100%; box-sizing:border-box; padding:7px 10px; border:1px solid var(--border); border-radius:4px; background:var(--bg-input); color:var(--text); font-size:14px; }
.req-form textarea { min-height:90px; resize:vertical; }
.req-detail-header { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
.req-detail-id { font-size:13px; color:var(--text-dim); font-family:monospace; }
.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
.badge-open { background:#dbeafe; color:#1d4ed8; }
.badge-in-review { background:#fef9c3; color:#a16207; }
.badge-resolved { background:#dcfce7; color:#15803d; }
.badge-high { background:#fee2e2; color:#b91c1c; }
.badge-medium { background:#fef3c7; color:#b45309; }
.badge-low { background:#f0fdf4; color:#166534; }
.req-actions { display:flex; gap:8px; margin-top:20px; }
</style>
</head>
<body>
<nav class="navbar">
  <span class="navbar-brand">📋 ASPICE Doc Tool</span>
  <div class="nav-links">
    <a href="/"             class="nav-link">Portal</a>
    <a href="/editor"       class="nav-link">Editor</a>
    <a href="/viewer"       class="nav-link">Viewer</a>
    <a href="/traceability" class="nav-link">Traceability</a>
    <a href="/library"      class="nav-link">Library</a>
    <a href="/requests"     class="nav-link active">Requests</a>
  </div>
  <div class="nav-workspace">
    <span style="font-size:12px;color:var(--text-dim)">要望管理</span>
  </div>
</nav>

<div class="req-layout">
  <!-- 要望一覧 -->
  <div class="req-list-pane">
    <div class="req-list-header">
      <span class="main-title">要望一覧</span>
      <button class="btn btn-primary btn-sm" onclick="openNew()">＋ 追加</button>
    </div>
    <div id="reqItems" class="req-items"></div>
  </div>

  <!-- 詳細・編集 -->
  <div class="req-detail-pane" id="detailPane">
    <div class="empty">要望を選択するか、「＋ 追加」で新規作成してください</div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/requests.js"></script>
</body>
</html>
